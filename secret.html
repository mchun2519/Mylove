<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 我们的专属相册 📸</title>
    <style>
        /* 保持和首页一致的浪漫背景 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #ffe6eb;
            background-image: radial-gradient(circle at 50% 0%, #fff0f5 0%, #ffe6eb 70%, #ffd1dc 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 动态背景装饰层 */
        .deco-container {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .float-item {
            position: absolute;
            bottom: -30px;
            pointer-events: none;
            opacity: 0;
            animation: float-up linear forwards;
            filter: drop-shadow(0 2px 4px rgba(255, 182, 193, 0.4));
        }

        @keyframes float-up {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* 页面主体容器 */
        .album-container {
            width: 90%;
            max-width: 800px;
            margin: 40px auto;
            z-index: 10;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 返回按钮 */
        .back-btn {
            align-self: flex-start;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.8);
            color: #ff6b81;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(255, 182, 193, 0.2);
            transition: all 0.2s;
            margin-bottom: 20px;
        }
        .back-btn:hover {
            background: #fff;
            transform: translateX(-5px);
        }

        /* 标题 */
        .album-title {
            color: #ff6b81;
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.8);
        }
        .album-subtitle {
            color: #777;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* 📸 照片瀑布流 / 网格布局 */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            width: 100%;
        }

        /* 拍立得卡片样式 */
        .photo-card {
            background: #fff;
            padding: 10px 10px 20px 10px; /* 底部留白多一点写字 */
            border-radius: 8px;
            box-shadow: 0 6px 15px rgba(255, 154, 162, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
            cursor: pointer;
        }

        /* 悬停动画：放大并随机倾斜 */
        .photo-card:hover {
            transform: scale(1.08) rotate(2deg);
            box-shadow: 0 10px 25px rgba(255, 154, 162, 0.4);
            z-index: 2;
        }
        .photo-card:nth-child(even):hover {
            transform: scale(1.08) rotate(-2deg); /* 偶数卡片往左歪，更有趣 */
        }

        /* 存放照片的区域 */
        .img-box {
            width: 100%;
            aspect-ratio: 1 / 1; /* 正方形裁剪 */
            background-color: #ffe6eb; /* 如果没放照片，显示粉色底 */
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffb6c1;
            font-size: 0.8rem;
        }

        /* 实际图片的样式 */
        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 保证图片不变形填满盒子 */
        }

        /* 照片下面的配文 */
        .photo-text {
            margin-top: 15px;
            color: #555;
            font-size: 0.9rem;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="deco-container" id="deco-box"></div>

    <div class="album-container">
        <a href="index.html" class="back-btn">⬅ 返回我们的秘密基地</a>

        <h1 class="album-title">📸 心动瞬间</h1>
        <div class="album-subtitle">这里藏着我们走过的路，和看过的风景</div>

        <div class="photo-grid">
            
            <div class="photo-card">
                <div class="img-box">
                    <img src="1.jpg">
                </div>
                <div class="photo-text">我们的合照</div>
            </div>

            <div class="photo-card">
                <div class="img-box">
                   <img src="2.jpg">
                </div>
                <div class="photo-text">可爱的自拍</div>
            </div>

            <div class="photo-card">
                <div class="img-box">
                   <img src="3.jpg">
                </div>
                <div class="photo-text">好吃的美食🍲</div>
            </div>

            <div class="photo-card">
                <div class="img-box">
                    <img src="4.jpg">
                </div>
                <div class="photo-text">偷偷拍的你</div>
            </div>

            </div>
    </div>

    <script>
        // 继续保留浪漫的漂浮物特效
        function createDeco() {
            var container = document.getElementById('deco-box');
            var icons = ['🌸', '✨', '🫧', '💖', '⭐', '💕'];
            
            setInterval(function() {
                var item = document.createElement('div');
                item.className = 'float-item';
                item.style.left = Math.random() * 100 + '%';
                item.style.innerHTML = icons[Math.floor(Math.random() * icons.length)];
                
                var size = Math.random() * 12 + 12;
                item.style.fontSize = size + 'px';
                
                var duration = Math.random() * 4 + 4;
                item.style.animationDuration = duration + 's';

                container.appendChild(item);
                setTimeout(function() { item.remove(); }, duration * 1000);
            }, 600); 
        }

        window.onload = function() {
            createDeco();
        };
    </script>
</body>
</html>
