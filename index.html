            cursor: pointer;
            border: 2px solid #ffe4e1;
            animation: spin 4s linear infinite;
            animation-play-state: paused; 
            transition: transform 0.2s;

        .music-btn:active {
            transform: scale(0.9);
        }

            animation-play-state: running;
            border-color: #ff9a9e;

    document.getElementById("horoscope-tip-text").innerText = "今天的星轨有点乱，默契需要你们自己来写。";
    return;
  }

  // 2. 极简处理逻辑：计算默契指数
  let baseScore = (data.mrZhu.love_index + data.msShi.love_index) / 2;
  let randomOffset = (Math.random() * 4) - 2; 
  let finalSyncScore = Math.round(baseScore + randomOffset);
  if (finalSyncScore > 100) finalSyncScore = 100;

  // 3. 匹配自定义文案
  let tipList;
  if (finalSyncScore >= 90) {
    tipList = tipDatabase.high;
  } else if (finalSyncScore >= 80) {
    tipList = tipDatabase.medium;
  } else {
    tipList = tipDatabase.low;
  }
  const randomTip = tipList[Math.floor(Math.random() * tipList.length)];

  // 4. 更新前端 UI
  document.getElementById("sync-score-num").innerText = finalSyncScore;
  document.getElementById("horoscope-tip-text").innerText = randomTip;
}
        // 页面加载完成后立即执行星象更新
        document.addEventListener("DOMContentLoaded", function() {
          updateDailyHoroscopeSync();
        });

    </script>
