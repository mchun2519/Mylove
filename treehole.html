<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 我们的专属树洞 🌸</title>
    <style>
        /* 保持统一的浪漫背景 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #ffe6eb;
            background-image: radial-gradient(circle at 50% 0%, #fff0f5 0%, #ffe6eb 70%, #ffd1dc 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 动态装饰层 */
        .deco-container {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .float-item {
            position: absolute;
            bottom: -30px;
            pointer-events: none;
            opacity: 0;
            animation: float-up linear forwards;
            filter: drop-shadow(0 2px 4px rgba(255, 182, 193, 0.4));
        }

        @keyframes float-up {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* 页面主体容器 */
        .board-container {
            width: 90%;
            max-width: 600px; /* 留言板不需要太宽，窄一点更像手机聊天 */
            margin: 40px auto;
            z-index: 10;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 返回按钮 */
        .back-btn {
            align-self: flex-start;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.8);
            color: #ff6b81;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(255, 182, 193, 0.2);
            transition: all 0.2s;
            margin-bottom: 20px;
        }
        .back-btn:hover {
            background: #fff;
            transform: translateX(-5px);
        }

        /* 标题区域 */
        .board-title {
            color: #ff6b81;
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.8);
        }
        .board-subtitle {
            color: #777;
            font-size: 0.9rem;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.5;
        }

        /* 📝 输入区域（写留言的地方） */
        .input-area {
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(255, 154, 162, 0.2);
            margin-bottom: 30px;
            box-sizing: border-box;
            border: 2px solid #fff;
            transition: border-color 0.3s;
        }
        .input-area:focus-within {
            border-color: #ffb6c1; /* 输入时边框变粉 */
        }

        .message-input {
            width: 100%;
            height: 100px;
            border: none;
            background: transparent;
            resize: none;
            font-family: inherit;
            font-size: 1rem;
            color: #555;
            outline: none;
            line-height: 1.5;
        }
        .message-input::placeholder {
            color: #ccc;
        }

        .submit-btn {
            float: right;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 154, 162, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 154, 162, 0.6);
        }
        .submit-btn:active {
            transform: translateY(1px);
        }

        /* 💌 留言列表区域 */
        .message-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 单条留言气泡样式 */
        .message-card {
            background: #ffffff;
            border-radius: 20px;
            border-top-left-radius: 4px; /* 做出聊天气泡的感觉 */
            padding: 18px 20px;
            box-shadow: 0 4px 15px rgba(255, 154, 162, 0.15);
            position: relative;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.9) translateY(10px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .msg-text {
            color: #444;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 10px;
            word-wrap: break-word;
            white-space: pre-wrap; /* 保留换行符 */
        }

        .msg-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px dashed #ffe4e1;
            padding-top: 8px;
        }

        .msg-time {
            color: #aaa;
            font-size: 0.8rem;
        }

        .msg-icon {
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="deco-container" id="deco-box"></div>

    <div class="board-container">
        <a href="index.html" class="back-btn">⬅ 返回我们的秘密基地</a>

        <h1 class="board-title">🌸 专属树洞</h1>
        <div class="board-subtitle">开心、难过、想念，或是突然冒出的碎碎念<br>都可以丢进这里，我都会听见。</div>

        <div class="input-area">
            <textarea id="myInput" class="message-input" placeholder="写下你想对我说的话..."></textarea>
            <button class="submit-btn" onclick="postMessage()">发送 💌</button>
            <div style="clear: both;"></div> </div>

        <div class="message-list" id="messageBox">
            </div>
    </div>

    <script>
        // --- 1. 浪漫漂浮物特效 ---
        function createDeco() {
            var container = document.getElementById('deco-box');
            var icons = ['🌸', '✨', '🫧', '💖', '💌', '💕'];
            
            setInterval(function() {
                var item = document.createElement('div');
                item.className = 'float-item';
                item.style.left = Math.random() * 100 + '%';
                item.style.innerHTML = icons[Math.floor(Math.random() * icons.length)];
                
                var size = Math.random() * 12 + 12;
                item.style.fontSize = size + 'px';
                
                var duration = Math.random() * 4 + 4;
                item.style.animationDuration = duration + 's';

                container.appendChild(item);
                setTimeout(function() { item.remove(); }, duration * 1000);
            }, 600); 
        }

        // --- 2. 留言板核心功能 (本地存储) ---
        
        // 格式化当前时间 (例如：2026-05-20 13:14)
        function getFormattedTime() {
            var now = new Date();
            var year = now.getFullYear();
            var month = String(now.getMonth() + 1).padStart(2, '0');
            var day = String(now.getDate()).padStart(2, '0');
            var hours = String(now.getHours()).padStart(2, '0');
            var minutes = String(now.getMinutes()).padStart(2, '0');
            return year + '-' + month + '-' + day + ' ' + hours + ':' + minutes;
        }

        // 加载留言历史
        function loadMessages() {
            var box = document.getElementById('messageBox');
            box.innerHTML = ''; // 清空当前显示
            
            // 从本地存储获取记录，如果没有则默认为一个空数组
            var messages = JSON.parse(localStorage.getItem('our_treehole_msgs')) || [];
            
            // 如果连一条留言都没有，显示一句提示语
            if (messages.length === 0) {
                box.innerHTML = '<div style="text-align:center; color:#999; font-size:0.9rem; margin-top:20px;">树洞空空如也，快来写下第一条留言吧~ 🐾</div>';
                return;
            }

            // 倒序遍历（最新的留言显示在最上面）
            for (var i = messages.length - 1; i >= 0; i--) {
                var msg = messages[i];
                var icons = ['🐾', '🌸', '🍓', '🍬', '🎈', '☁️'];
                var randomIcon = icons[Math.floor(Math.random() * icons.length)];

                // 构建气泡 HTML
                var html = `
                    <div class="message-card">
                        <div class="msg-text">${msg.text}</div>
                        <div class="msg-footer">
                            <span class="msg-time">${msg.time}</span>
                            <span class="msg-icon">${randomIcon}</span>
                        </div>
                    </div>
                `;
                box.innerHTML += html;
            }
        }

        // 发送新留言
        function postMessage() {
            var inputElement = document.getElementById('myInput');
            var text = inputElement.value.trim(); // 获取并去掉前后空格

            if (!text) {
                alert("哼，还没写字呢就点发送！");
                return;
            }

            // 获取旧留言数组
            var messages = JSON.parse(localStorage.getItem('our_treehole_msgs')) || [];
            
            // 把新留言塞进去
            messages.push({
                text: text,
                time: getFormattedTime()
            });

            // 保存到浏览器本地
            localStorage.setItem('our_treehole_msgs', JSON.stringify(messages));

            // 清空输入框，重新加载列表
            inputElement.value = '';
            loadMessages();
        }

        // 页面一打开就执行
        window.onload = function() {
            createDeco();
            loadMessages();
        };
    </script>
</body>
</html>
